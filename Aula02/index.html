<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Controles de Formulários</title>
</head>

<body>

    <h1>Preferências</h1>
    <form action="index.html">

        <label>Nome:</label>
        <input type="text" name="nome">
        <br><br>
        <label>Qual turno você prefere estudar?</label>
        <br>
        <input type="radio" name="turno">
        <label>Manhã</label>
        <br>
        <input type="radio" name="turno">
        <label>Tarde</label>
        <br>
        <input type="radio" name="turno">
        <label>Noite</label>
        <br><br>
        <label>Quais áreas da tecnologia você tem interesse?</label>
        <br>
        <input type="checkbox" name="area">
        <label>Programação</label>
        <br>
        <input type="checkbox" name="area">
        <label>Design</label>
        <br>
        <input type="checkbox" name="area">
        <label>Banco de Dados</label>
        <br>
        <input type="checkbox" name="area">
        <label>Redes</label>
        <br><br>
        <label>Qual a sua cor favorita?</label>
        <input type="color" name="cor">
        <br><br>
        <label>Qual o seu nível de satisfação?</label>
        <input type="range" name="satisfacao">
        <br><br>
        <label>Qual o seu horário preferido?</label>
        <input type="time" name="horario">
        <br><br>
        <label>Envie um arquivo</label>
        <input type="file" name="arquivo">
        <br><br>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
